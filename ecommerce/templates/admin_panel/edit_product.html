{% extends 'base.html' %}
{% block title %}Edit Product — Chimaz Admin{% endblock %}
{% block content %}
<div class="section">
  <div class="section-header">
    <h3>Edit Product</h3>
    <a href="{% url 'admin_dashboard' %}" class="btn-sm">← Back</a>
  </div>
  <form method="post" class="admin-form">
    {% csrf_token %}
    <div class="form-group">
      <label>Product Name</label>
      <input type="text" name="name" value="{{ product.name }}" required>
    </div>
    <div class="form-group">
      <label>Slug</label>
      <input type="text" name="slug" value="{{ product.slug }}" required>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select name="category" required>
        {% for cat in categories %}
        <option value="{{ cat.id }}"
          {% if cat.id == product.category.id %}selected{% endif %}>
          {{ cat.name }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ product.description }}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Price ($)</label>
        <input type="number" name="price" step="0.01" value="{{ product.price }}" required>
      </div>
      <div class="form-group">
        <label>Stock</label>
        <input type="number" name="stock" value="{{ product.stock }}" required>
      </div>
    </div>
    <div class="form-group">
      <label>Image URL</label>
      <input type="url" name="image_url" value="{{ product.image_url }}">
    </div>
    <div class="form-group form-check">
      <label>
        <input type="checkbox" name="available"
          {% if product.available %}checked{% endif %}>
        Available for sale
      </label>
    </div>
    <button type="submit" class="btn">Save Changes</button>
  </form>
</div>
{% endblock %}
