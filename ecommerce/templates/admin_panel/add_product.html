{% extends 'base.html' %}
{% block title %}Add Product — Chimaz Admin{% endblock %}
{% block content %}
<div class="section">
  <div class="section-header">
    <h3>Add New Product</h3>
    <a href="{% url 'admin_dashboard' %}" class="btn-sm">← Back</a>
  </div>
  <form method="post" class="admin-form">
    {% csrf_token %}
    <div class="form-group">
      <label>Product Name</label>
      <input type="text" name="name" required placeholder="e.g. Classic Pullover Hoodie">
    </div>
    <div class="form-group">
      <label>Slug</label>
      <input type="text" name="slug" required placeholder="e.g. classic-pullover-hoodie">
    </div>
    <div class="form-group">
      <label>Category</label>
      <select name="category" required>
        {% for cat in categories %}
        <option value="{{ cat.id }}">{{ cat.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" placeholder="Describe the product..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Price ($)</label>
        <input type="number" name="price" step="0.01" required placeholder="0.00">
      </div>
      <div class="form-group">
        <label>Stock</label>
        <input type="number" name="stock" required placeholder="0">
      </div>
    </div>
    <div class="form-group">
      <label>Image URL</label>
      <input type="url" name="image_url" placeholder="https://...">
    </div>
    <div class="form-group form-check">
      <label>
        <input type="checkbox" name="available" checked>
        Available for sale
      </label>
    </div>
    <button type="submit" class="btn">Add Product</button>
  </form>
</div>
{% endblock %}
